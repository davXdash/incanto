<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="description" content="Incanto – das private Italienmagazin von David & Kay.">
  <title>Incanto — Viviamo il sogno.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&family=Italiana&family=Parisienne&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    html,body{margin:0;background:#f3eee5}
    .approved-home{position:relative;width:min(100%,1024px);margin:0 auto;box-shadow:0 0 55px rgba(45,35,23,.13)}
    .approved-home>img{display:block;width:100%;height:auto}
    .hotspot{position:absolute;z-index:2;display:block;background:transparent;outline:none}
    .hotspot:focus-visible{box-shadow:inset 0 0 0 3px rgba(181,138,71,.9)}
    .hotspot-routes{left:48.5%;top:2.3%;width:9.5%;height:4.2%}
    .hotspot-menu{right:2.5%;top:2.2%;width:5.8%;height:4.5%}
    .hotspot-plan{left:3.1%;top:64.2%;width:30.3%;height:16.9%}
    .hotspot-inspiration{left:34.4%;top:64.2%;width:31.1%;height:16.9%}
    .hotspot-favorites{left:66.2%;top:64.2%;width:30.6%;height:16.9%}
    .hotspot-more{left:35.6%;top:92.1%;width:28.8%;height:3.7%}
    .route-database{padding:72px 3.2% 90px;background:#faf7f0}
    .route-database .section-heading{display:block;text-align:center}
    .route-database .section-heading h2{font-size:42px;margin:8px 0 5px}
    .route-database .section-heading p{font-size:18px;margin:0 auto 22px;max-width:650px}
    .utility-buttons{position:sticky;top:12px;z-index:12;display:flex;justify-content:flex-end;gap:8px;pointer-events:none;height:0}
    .utility-buttons button{pointer-events:auto;margin:12px;border:1px solid rgba(33,29,24,.18);background:rgba(250,247,240,.94);width:42px;height:42px;border-radius:50%;font-size:19px;cursor:pointer}
    @media(max-width:650px){.approved-home{box-shadow:none}.route-database{padding:52px 16px 70px}.route-database .section-heading h2{font-size:34px}}
  </style>
</head>
<body>
  <main>
    <section class="approved-home" aria-label="Genehmigtes Incanto-Startseiten-Design">
      <img src="assets/incanto-approved-mockup.svg" alt="Incanto – Viviamo il sogno. Genehmigtes Startseiten-Mockup von David und Kay">
      <a class="hotspot hotspot-routes" href="#routes" aria-label="Routen öffnen"></a>
      <a class="hotspot hotspot-menu" href="#routes" aria-label="Inhalte öffnen"></a>
      <a class="hotspot hotspot-plan" href="#routes" aria-label="Eigene Route planen"></a>
      <a class="hotspot hotspot-inspiration" href="#routes" aria-label="Routen entdecken"></a>
      <a class="hotspot hotspot-favorites" href="#routes" aria-label="Lieblingsrouten ansehen"></a>
      <a class="hotspot hotspot-more" href="#routes" aria-label="Mehr Momente und Routen entdecken"></a>
    </section>

    <section class="route-database" id="routes">
      <header class="section-heading">
        <span class="eyebrow">PERCORSI</span>
        <h2>Routen, die nach Incanto klingen</h2>
        <p>Ausgewählte Grundrouten, Quellen und unsere eigenen Abzweigungen.</p>
      </header>
      <div class="filters" id="filters" aria-label="Routen filtern">
        <button class="filter active" data-filter="all">Alle</button>
        <button class="filter" data-filter="sea">Meer</button>
        <button class="filter" data-filter="wine">Wein &amp; Genuss</button>
        <button class="filter" data-filter="mountain">Berge &amp; Seen</button>
        <button class="filter" data-filter="long">Große Reise</button>
      </div>
      <div class="route-grid" id="routeGrid" aria-live="polite"></div>
    </section>
  </main>

  <div class="utility-buttons">
    <button id="searchButton" aria-label="Suche öffnen">⌕</button>
    <button id="menuButton" aria-label="Menü öffnen">☰</button>
  </div>

  <dialog id="routeDialog" class="route-dialog"><button class="dialog-close" id="dialogClose" aria-label="Schließen">×</button><div id="dialogContent"></div></dialog>
  <dialog id="searchDialog" class="search-dialog"><button class="dialog-close" id="searchClose" aria-label="Schließen">×</button><div class="search-panel"><p class="section-label">Incanto durchsuchen</p><input id="searchInput" type="search" placeholder="Toskana, Wein, Meer, Keramik …" autocomplete="off"><div id="searchResults" class="search-results"></div></div></dialog>
  <aside class="menu-drawer" id="menuDrawer" aria-hidden="true"><button class="drawer-close" id="drawerClose">×</button><p class="section-label">Incanto</p><nav><a href="#routes">Percorsi <small>Routen</small></a><a href="#routes">Luoghi <small>Entdecken</small></a><a href="#routes">Sapori <small>Genießen</small></a><a href="#routes">Attimi d'Incanto <small>Momente</small></a><a href="#routes">Diario <small>Erinnerungen</small></a></nav></aside>
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <script src="app.js"></script>
</body>
</html>
